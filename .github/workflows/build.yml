name: Build & publish content

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'content/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Commit built JSON
        run: |
          git config user.name "lectio-bot"
          git config user.email "lectio-bot@users.noreply.github.com"
          git add public/
          git diff --staged --quiet || git commit -m "build: regenerate JSON [skip ci]"
          git push
